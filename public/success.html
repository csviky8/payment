<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TSVK Payment Receipt</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="checkout-shell">
      <section class="combo-header">
        <div class="brand-mark">T</div>
        <div>
          <p class="eyebrow">Payment Receipt</p>
          <h1>Checkout Complete</h1>
          <p id="receipt-text" class="lede">Loading receipt details...</p>
        </div>
      </section>
      <section class="section-block">
        <a class="secondary-button receipt-link" href="/">Back to TSVK plans</a>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get("order_id");
      const paymentId = params.get("payment_id");
      const receiptId = params.get("receipt");
      const receiptEl = document.getElementById("receipt-text");

      if (orderId) {
        localStorage.setItem("tsvk-order-id", orderId);
      }
      if (paymentId) {
        localStorage.setItem("tsvk-payment-id", paymentId);
      }

      if (orderId) {
        receiptEl.textContent = `TSVK payment verified for order ${orderId}. Payment ${paymentId} is linked to receipt ${receiptId || "n/a"}.`;
      } else {
        receiptEl.textContent = "Payment completed. Open the payment status panel to verify the order.";
      }
    </script>
  </body>
</html>
